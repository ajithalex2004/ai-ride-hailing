worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression for high-performance data transfer
    gzip on;
    gzip_types text/plain application/xml application/json text/css;

    # Upstreams for Microservices High Availability
    
    upstream identity_service {
        least_conn;
        server identity-service:8080 max_fails=3 fail_timeout=30s;
    }

    upstream ride_service {
        least_conn;
        server ride-service:8081;
    }

    upstream dispatch_service {
        least_conn;
        server dispatch-service:8082;
    }

    upstream fraud_service {
        least_conn;
        server fraud-service:8085;
    }

    upstream corporate_service {
        least_conn;
        server corporate-service:8087;
    }

    server {
        listen       80;
        server_name  api.airidehailing.exl;

        # Security Headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # API Routing Gateway
        
        location /api/v1/auth/ {
            proxy_pass http://identity_service/;
            include proxy_params;
        }

        location /api/v1/rides/ {
            proxy_pass http://ride_service/;
            include proxy_params;
        }

        location /api/v1/dispatch/ {
            proxy_pass http://dispatch_service/;
            include proxy_params;
        }

        location /api/v1/fraud/ {
            proxy_pass http://fraud_service/;
            include proxy_params;
        }

        location /api/v1/corporate/ {
            proxy_pass http://corporate_service/;
            include proxy_params;
        }

        # Health Check Endpoint for Orchestrator
        location /health {
            access_log off;
            return 200 "healthy\n";
        }
    }
}
