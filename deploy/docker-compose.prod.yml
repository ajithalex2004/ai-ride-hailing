version: '3.8'

services:
  # API Gateway & Load Balancer
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - identity-service
      - ride-service
      - dispatch-service
      - fraud-service
      - corporate-service

  # Core Backend Mesh
  identity-service:
    build:
      context: ../services/auth
      dockerfile: ../../Dockerfile.template
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}

  ride-service:
    build:
      context: ../services/ride
      dockerfile: ../../Dockerfile.template
    environment:
      - PORT=8081
      - DATABASE_URL=${DATABASE_URL}

  dispatch-service:
    build:
      context: ../services/dispatch
      dockerfile: ../../Dockerfile.template
    environment:
      - PORT=8082
      - DATABASE_URL=${DATABASE_URL}

  fraud-service:
    build:
      context: ../services/fraud
      dockerfile: ../../Dockerfile.template
    environment:
      - PORT=8085
      - DATABASE_URL=${DATABASE_URL}

  corporate-service:
    build:
      context: ../services/corporate
      dockerfile: ../../Dockerfile.template
    environment:
      - PORT=8087
      - DATABASE_URL=${DATABASE_URL}

networks:
  default:
    driver: bridge
