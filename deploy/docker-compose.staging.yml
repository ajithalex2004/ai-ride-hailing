version: '3.8'

services:
  # Staging API Gateway
  gateway-staging:
    image: nginx:alpine
    ports:
      - "8080:80" # Exposed on port 8080 for staging
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - identity-staging
      - ride-staging

  # Staging Microservices (Suffix with -staging for isolation)
  identity-staging:
    build:
      context: ../services/auth
      dockerfile: ../../Dockerfile.template
    environment:
      - PORT=8080
      - DATABASE_URL=${STAGING_DATABASE_URL}
      - JWT_SECRET=${STAGING_JWT_SECRET}
      - ENVIRONMENT=staging

  ride-staging:
    build:
      context: ../services/ride
      dockerfile: ../../Dockerfile.template
    environment:
      - PORT=8081
      - DATABASE_URL=${STAGING_DATABASE_URL}
      - ENVIRONMENT=staging

  dispatch-staging:
    build:
      context: ../services/dispatch
      dockerfile: ../../Dockerfile.template
    environment:
      - PORT=8082
      - DATABASE_URL=${STAGING_DATABASE_URL}
      - ENVIRONMENT=staging

  fraud-staging:
    build:
      context: ../services/fraud
      dockerfile: ../../Dockerfile.template
    environment:
      - PORT=8085
      - DATABASE_URL=${STAGING_DATABASE_URL}
      - ENVIRONMENT=staging

networks:
  staging-network:
    driver: bridge
