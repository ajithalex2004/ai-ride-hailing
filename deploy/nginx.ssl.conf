worker_processes auto;
events { worker_connections 1024; }

http {
    include mime.types;
    sendfile on;

    # Force HTTPS
    server {
        listen 80;
        server_name api.airidehailing.exl;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name api.airidehailing.exl;

        ssl_certificate /etc/letsencrypt/live/api.airidehailing.exl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.airidehailing.exl/privkey.pem;
        
        # Best Practice SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";

        location /api/v1/auth/ {
            proxy_pass http://identity-service:8080/;
            include proxy_params;
        }

        # ... other service routes as previously defined
    }
}
